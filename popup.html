<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataSaver NG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0f1e;
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #00c851, #007a3d);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header span {
      font-size: 11px;
      opacity: 0.85;
    }

    .flag { font-size: 22px; }

    .body { padding: 16px; }

    .stat-card {
      background: #131929;
      border: 1px solid #1e2d45;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stat-icon {
      font-size: 26px;
      width: 40px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #6b7fa3;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #00c851;
    }

    .stat-sub {
      font-size: 11px;
      color: #6b7fa3;
      margin-top: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e2d45;
      margin: 12px 0;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row .stat-card {
      flex: 1;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .row .stat-icon { font-size: 18px; width: auto; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #0d1526;
      border-top: 1px solid #1e2d45;
      font-size: 11px;
      color: #6b7fa3;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #00c851;
      animation: pulse 2s infinite;
    }

    .dot.offline { background: #ff4444; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #1e2d45;
      color: #6b7fa3;
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 11px;
    }

    #refresh-btn:hover { border-color: #00c851; color: #00c851; }

    .loading { color: #6b7fa3; font-size: 13px; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>

<div class="header">
  <span class="flag">🇳🇬</span>
  <div>
    <h1>DataSaver NG</h1>
    <span>Your data, your money, protected</span>
  </div>
</div>

<div class="body">
  <div id="loading" class="loading">Loading stats...</div>

  <div id="content" style="display:none">
    <div class="stat-card">
      <div class="stat-icon">💾</div>
      <div>
        <div class="stat-label">Total Data Saved</div>
        <div class="stat-value" id="data-saved">0 MB</div>
        <div class="stat-sub" id="saving-percent">Calculating savings...</div>
      </div>
    </div>

    <div class="row">
      <div class="stat-card">
        <div class="stat-icon">🚫</div>
        <div class="stat-label">Blocked</div>
        <div class="stat-value" id="blocked">0</div>
        <div class="stat-sub">trackers</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-label">Requests</div>
        <div class="stat-value" id="requests">0</div>
        <div class="stat-sub">optimized</div>
      </div>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Connecting to proxy...</span>
  <button id="refresh-btn">↻ Refresh</button>
</div>

<script src="popup.js"></script>
</body>
</html>
